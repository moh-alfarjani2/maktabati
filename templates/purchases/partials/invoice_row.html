<tr class="item-row">
    <td class="ps-4">
        <select name="product[]"
                class="form-select product-select"
                required
                onchange="updatePrice(this)">
            <option value="">اختر المنتج...</option>
            {% for p in products %}
                <option value="{{ p.id }}"
                        data-buy="{{ p.purchase_price|stringformat:'g' }}"
                        data-sell="{{ p.selling_price|stringformat:'g' }}"
                        data-pkg-buy="{{ p.package_purchase_price|stringformat:'g' }}"
                        data-pkg-sell="{{ p.package_selling_price|stringformat:'g' }}"
                        data-pkg-qty="{{ p.package_qty|stringformat:'g' }}"
                        data-tax="{{ p.tax_rate|stringformat:'g' }}"
                        {% if item.product_id == p.id %}selected{% endif %}>{{ p.name }} ({{ p.product_id }})</option>
            {% endfor %}
        </select>
    </td>
    <td class="text-center">
        <div class="form-check form-switch d-inline-block mt-2">
            <input class="form-check-input pkg-switch"
                   type="checkbox"
                   onchange="togglePkg(this)"
                   {% if item.is_package %}checked{% endif %}>
            <input type="hidden"
                   name="is_package[]"
                   value="{% if item.is_package %}true{% else %}false{% endif %}"
                   class="pkg-hidden">
        </div>
    </td>
    <td>
        <div class="pkg-inputs {% if not item.is_package %}d-none{% endif %}">
            <div class="input-group input-group-sm mb-1">
                <span class="input-group-text">عدد</span>
                <input type="number"
                       step="0.001"
                       name="package_qty[]"
                       class="form-control pkg-qty-input"
                       value="{{ item.package_qty|stringformat:'g' }}"
                       oninput="calculateRow(this)">
            </div>
            <div class="input-group input-group-sm">
                <span class="input-group-text">سعة</span>
                <input type="number"
                       step="0.001"
                       name="pcs_per_pkg[]"
                       class="form-control pcs-pkg-input"
                       value="{{ item.pieces_per_package|stringformat:'g' }}"
                       oninput="calculateRow(this)">
            </div>
            <small class="calc-hint total-pcs-hint">المجموع: {{ item.quantity|stringformat:'g' }} قطعة</small>
        </div>
        <div class="pcs-inputs {% if item.is_package %}d-none{% endif %}">
            <input type="number"
                   step="0.001"
                   name="quantity[]"
                   class="form-control form-control-sm pcs-qty-input"
                   value="{{ item.quantity|stringformat:'g' }}"
                   oninput="calculateRow(this)">
            <small class="calc-hint">بيع بالقطعة</small>
        </div>
    </td>
    <td>
        <div class="pkg-inputs {% if not item.is_package %}d-none{% endif %}">
            <input type="number"
                   step="0.01"
                   name="package_price[]"
                   class="form-control form-control-sm pkg-buy-input"
                   value="{{ item.package_purchase_price|stringformat:'g' }}"
                   oninput="calculateRow(this)">
            <small class="calc-hint unit-buy-hint">للقطعة: {{ item.unit_price|stringformat:'g' }}</small>
        </div>
        <div class="pcs-inputs {% if item.is_package %}d-none{% endif %}">
            <input type="number"
                   step="0.01"
                   name="price[]"
                   class="form-control form-control-sm unit-buy-input_field"
                   value="{{ item.unit_price|stringformat:'g' }}"
                   oninput="calculateRow(this)">
        </div>
    </td>
    <td>
        <div class="pkg-inputs {% if not item.is_package %}d-none{% endif %}">
            <input type="number"
                   step="0.01"
                   name="package_sell_price[]"
                   class="form-control form-control-sm pkg-sell-input"
                   value="{{ item.package_selling_price|stringformat:'g' }}"
                   oninput="calculateRow(this)">
            <div class="d-flex justify-content-between align-items-center mt-1">
                <small class="calc-hint unit-sell-hint">للقطعة: {{ item.suggested_selling_price|stringformat:'g' }}</small>
                <span class="profit-badge bg-success-subtle text-success pkg-profit">0%</span>
            </div>
        </div>
        <div class="pcs-inputs {% if item.is_package %}d-none{% endif %}">
            <input type="number"
                   step="0.01"
                   name="sell_price[]"
                   class="form-control form-control-sm unit-sell-input_field"
                   value="{{ item.suggested_selling_price|stringformat:'g' }}"
                   oninput="calculateRow(this)">
            <div class="d-flex justify-content-between align-items-center mt-1">
                <small class="calc-hint">سعر البيع</small>
                <span class="profit-badge bg-primary-subtle text-primary pcs-profit">0%</span>
            </div>
        </div>
    </td>
    <td>
        <input type="number"
               step="0.01"
               name="tax[]"
               class="form-control form-control-sm tax-input"
               value="{{ item.tax|stringformat:'g' }}"
               oninput="calculateRow(this)">
    </td>
    <td class="col-subtotal fw-bold text-dark pt-3">
        <span class="subtotal-txt">{{ item.total_price|stringformat:'g' }}</span>
        <small class="d-block text-muted" style="font-size:0.6rem;">ريال سعودي</small>
    </td>
    <td class="col-action pt-2">
        <button type="button"
                class="btn btn-link text-danger p-0 border-0"
                onclick="removeRow(this)">
            <i class="fas fa-times-circle fa-lg"></i>
        </button>
    </td>
</tr>
