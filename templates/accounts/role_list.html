{% extends 'base.html' %}
{% block title %}إدارة الأدوار - نظام إدارة المكتبة{% endblock %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>أدوار المستخدمين (Roles)</h3>
        <a href="{% url 'role_create' %}" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i> إضافة دور جديد
        </a>
    </div>
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">اسم الدور</th>
                            <th class="text-end pe-4">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for role in roles %}
                            <tr>
                                <td class="ps-4 fw-bold">{{ role.name }}</td>
                                <td class="text-end pe-4">
                                    <button class="btn btn-sm btn-outline-danger"
                                            onclick="Swal.fire('قريباً', 'ميزة حذف الأدوار ستتوفر لاحقاً', 'info')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        {% empty %}
                            <tr>
                                <td colspan="2" class="text-center py-4 text-muted">لم يتم تعريف أدوار حتى الآن</td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
{% endblock %}
