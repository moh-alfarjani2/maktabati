{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"
              content="نظام إدارة المكتبة الاحترافي - تسجيل الدخول">
        <meta name="keywords" content="مكتبة, إدارة, مبيعات, مشتريات, مخزون">
        <title>تسجيل الدخول - نظام إدارة المكتبة</title>
        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap"
              rel="stylesheet">
        <!-- Bootstrap 5 CSS RTL -->
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
        <!-- Custom CSS -->
        <style>
        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background: linear-gradient(135deg, #4f46e5 0%, #1a1d2e 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            font-weight: 700;
            color: #1a1d2e;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #6b7280;
        }
        .btn-primary {
            background-color: #4f46e5;
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
        }
        .form-control {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            border-color: #4f46e5;
        }
        .icon-box {
            width: 60px;
            height: 60px;
            background: #4f46e5;
            color: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
        }
        </style>
        <!-- Font Awesome -->
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    </head>
    <body>
        <div class="login-card">
            <div class="login-header">
                <div class="icon-box">
                    <i class="fas fa-book-open"></i>
                </div>
                <h2>تسجيل الدخول</h2>
                <p>مرحباً بك في نظام إدارة المكتبة</p>
            </div>
            <form method="post">
                {% csrf_token %}
                {% if form.errors %}<div class="alert alert-danger py-2 small">اسم المستخدم أو كلمة المرور غير صحيحة.</div>{% endif %}
                <div class="mb-3">
                    <label class="form-label">اسم المستخدم</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-user"></i></span>
                        <input type="text"
                               name="username"
                               class="form-control border-start-0"
                               required
                               placeholder="أدخل اسم المستخدم">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">كلمة المرور</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock"></i></span>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control border-start-0 border-end-0"
                               required
                               placeholder="أدخل كلمة المرور">
                        <button type="button"
                                class="btn btn-light border border-start-0"
                                id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">دخول النظام</button>
                <div class="text-center">
                    <small class="text-muted">نسيت كلمة المرور؟ التواصل مع المدير.</small>
                </div>
            </form>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            // toggle the type attribute
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            // toggle the eye / eye slash icon
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });
        </script>
    </body>
</html>
