{% extends 'base.html' %}
{% load static %}
{% block title %}تسجيل تالف جديد{% endblock %}
{% block extra_css %}
    <style>
    .form-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .product-row { background: #f8fafc; border-radius: 12px; transition: all 0.2s; }
    .product-row:hover { background: #f1f5f9; }
    .remove-row { color: #ef4444; cursor: pointer; transition: transform 0.2s; }
    .remove-row:hover { transform: scale(1.2); }
    </style>
{% endblock %}
{% block content %}
    <div class="container py-4 fade-in">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold text-dark mb-1">تسجيل تالف جديد</h2>
                        <p class="text-muted small">قم بإدخال الكتب التالفة وسبب التلف</p>
                    </div>
                    <a href="{% url 'damages:list' %}"
                       class="btn btn-light rounded-pill px-4">
                        <i class="fas fa-arrow-right me-1"></i> العودة
                    </a>
                </div>
                <form method="POST" id="damageForm" class="needs-validation" novalidate>
                    {% csrf_token %}
                    <div class="card form-card mb-4">
                        <div class="card-body p-4">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">السبب الرئيسي للتلف</label>
                                    <select name="reason" class="form-select form-select-lg rounded-3" required>
                                        <option value="" selected disabled>اختر السبب...</option>
                                        <option value="تمزيق">تمزيق / تخريب</option>
                                        <option value="سوء تخزين">سوء تخزين (رطوبة/أتربة)</option>
                                        <option value="فقدان">فقدان / ضياع</option>
                                        <option value="خطأ مطبعي">خطأ مطبعي / تلف مصنعي</option>
                                        <option value="أخرى">أخرى</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">تاريخ التلف</label>
                                    <input type="date"
                                           name="damage_date"
                                           class="form-control form-control-lg rounded-3"
                                           value="{{ today|date:'Y-m-d' }}"
                                           required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold">ملاحظات إضافية</label>
                                    <textarea name="notes"
                                              class="form-control rounded-3"
                                              rows="3"
                                              placeholder="اكتب أي تفاصيل أخرى هنا..."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card form-card">
                        <div class="card-header bg-white border-0 p-4 pb-0 d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold mb-0">قائمة الكتب التالفة</h5>
                            <button type="button"
                                    class="btn btn-outline-primary btn-sm rounded-pill px-3"
                                    id="addRow">
                                <i class="fas fa-plus me-1"></i> إضافة كتاب
                            </button>
                        </div>
                        <div class="card-body p-4">
                            <div id="itemsContainer">
                                <!-- Rows will be added here -->
                            </div>
                            <div class="mt-5 d-grid">
                                <button type="submit"
                                        class="btn btn-primary btn-lg rounded-3 fw-bold py-3 shadow">
                                    <i class="fas fa-save me-2"></i> حفظ تقرير التالف
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- Template for Row -->
    <template id="itemRowTemplate">
        <div class="product-row p-3 mb-3 animate__animated animate__fadeIn">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label small fw-bold text-muted">الكتاب</label>
                    <select name="product_id[]" class="form-select select-product" required>
                        <option value="" selected disabled>اختر الكتاب...</option>
                        {% for p in products %}
                            <option value="{{ p.id }}"
                                    data-cost="{{ p.avg_cost|default:p.purchase_price }}">
                                {{ p.name }} (مخزون: {{ p.current_stock|floatformat:0 }})
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">الكمية التالفة</label>
                    <input type="number"
                           name="quantity[]"
                           class="form-control"
                           step="1"
                           min="1"
                           required>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">تكلفة الوحدة بالتقريب</label>
                    <input type="number"
                           name="unit_cost[]"
                           class="form-control unit-cost"
                           step="0.01"
                           required
                           readonly>
                </div>
                <div class="col-md-1 text-center">
                    <button type="button" class="btn btn-link remove-row p-0 mb-2">
                        <i class="fas fa-trash-alt fa-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </template>
{% endblock %}
{% block extra_js %}
    <script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('itemsContainer');
    const addButton = document.getElementById('addRow');
    const template = document.getElementById('itemRowTemplate');

    function addRow() {
        const clone = template.content.cloneNode(true);
        container.appendChild(clone);
        
        // Listen for product changes in this new row to auto-fill cost
        const lastRow = container.lastElementChild;
        const select = lastRow.querySelector('.select-product');
        const costInput = lastRow.querySelector('.unit-cost');
        
        select.addEventListener('change', function() {
            const selected = this.options[this.selectedIndex];
            costInput.value = selected.dataset.cost || 0;
        });

        // Delete logic
        lastRow.querySelector('.remove-row').addEventListener('click', function() {
            lastRow.remove();
        });
    }

    addButton.addEventListener('click', addRow);
    
    // Add one row initially
    addRow();
});
    </script>
{% endblock %}
